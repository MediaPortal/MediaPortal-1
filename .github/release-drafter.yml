name-template: $RESOLVED_VERSION
tag-template: $RESOLVED_VERSION
exclude-contributors:
  - github-actions[bot]
  - github-actions
  - dependabot[bot]
  - dependabot
categories:
  - title: ❗️ Breaking Changes
    labels:
      - breaking
      - breaking changes
  - title: 🎥 Mediaportal
    labels:
      - database
      - engine
      - grabber
      - MPE
      - tuning
      - TV
  - title: 📱 Skins
    labels:
      - skin
  - title: 🚀 Features
    labels:
      - feature
      - enhancement
  - title: 🐛 Bug Fixes
    labels:
      - fix
      - bug
      - bugfix
      - critical
  - title: 🧰 Maintenance
    labels:
      - chore
      - cosmetic
      - dependencies
      - documentation
      - workflow
change-template: "- $TITLE @$AUTHOR ($URL)"
change-title-escapes: '\<*_&'  # You can add # and @ to disable mentions, and add ` to disable code blocks.
version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - minor
  patch:
    labels:
      - patch
      - dependencies
  default: patch
template: |
  [![Downloads](https://img.shields.io/github/downloads/$OWNER/$REPOSITORY/$RESOLVED_VERSION/total)](https://github.com/$OWNER/$REPOSITORY/releases/tag/$RESOLVED_VERSION)

  ## What's Changed

  $CHANGES

  ## 🤝 Support

  If you like the project, you can support it with a star ⭐ on GitHub. [Donate](https://forum.team-mediaportal.com/donate/)

  ## ✨ Changelog

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...$RESOLVED_VERSION
